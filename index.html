<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Unity WebGL | ManholeStagBeetle</title>
    <style>
      body {
        background-color: #222222;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        height: 100dvh; /* スマホのURLバーを考慮した高さ */
        overflow: hidden;
      }

      /* ▼ 基本設定（スマホ用）：画面いっぱいに広げる ▼ */
      #unity-container {
        width: 100%;
        height: 100%;
        background-color: #000000;
        position: relative;
      }

      /* ▼ PC・タブレット用：画面の高さに合わせて9:16に固定する ▼ */
      @media screen and (min-width: 600px) {
        #unity-container {
          height: 95vh; /* 画面の高さの95%を基準にする */
          width: calc(95vh * 9 / 16); /* 高さを基準に横幅を計算 */
          box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
          border-radius: 12px; /* スマホっぽく角を少し丸める */
          overflow: hidden;
        }
      }

      #unity-canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
      }

      #unity-loading-bar {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        color: #ffffff;
        font-family: sans-serif;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-loading-text">Loading...</div>
      </div>
    </div>
    <script>
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/WebPage_ManholeStagBeetle.loader.js";
      var config = {
        dataUrl: buildUrl + "/WebPage_ManholeStagBeetle.data.unityweb",
        frameworkUrl: buildUrl + "/WebPage_ManholeStagBeetle.framework.js.unityweb",
        codeUrl: buildUrl + "/WebPage_ManholeStagBeetle.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "ManholeStagBeetle",
        productVersion: "0.1.0",
      };

      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");

      var script = document.createElement("script");
      script.src = loaderUrl;
      // Unityが生成する特殊なマクロを使用してロードを実行
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
