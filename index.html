<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL | ManholeStagBeetle</title>
    <style>
      /* 画面全体を黒背景にし、コンテンツを中央に寄せる */
      body {
        background-color: #222222;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }

      /* 表示領域をスマホサイズ（9:16）に固定するCSS */
      #unity-container {
        width: 100vw;
        max-width: 450px; /* PCで見たときの横幅の上限 */
        aspect-ratio: 9 / 16; /* 縦横比を9:16に固定 */
        position: relative;
        background-color: #000000;
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.7); /* 見栄えを良くする影 */
      }

      /* Unityのキャンバスをコンテナの大きさに100%追従させる */
      #unity-canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
      }

      /* シンプルな読み込み中テキストの配置 */
      #unity-loading-bar {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        color: #ffffff;
        font-family: sans-serif;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-loading-text">Loading...</div>
      </div>
    </div>
    <script>
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Build_WebGL.loader.js";
      var config = {
        dataUrl: buildUrl + "/Build_WebGL.data.unityweb",
        frameworkUrl: buildUrl + "/Build_WebGL.framework.js.unityweb",
        codeUrl: buildUrl + "/Build_WebGL.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "ManholeStagBeetle",
        productVersion: "0.1.0",
      };

      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          // 読み込み進捗があればここに処理を書けます
        }).then((unityInstance) => {
          loadingBar.style.display = "none"; // ロード完了でテキストを消す
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
